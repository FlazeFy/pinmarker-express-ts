name: PinMarker Integration Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: pinmarker
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/pinmarker
      PORT: 4000
      NODE_ENV: test
      BASE_URL: http://127.0.0.1:4000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env
        run: |
          cat > .env <<EOF
          DATABASE_URL=${{ env.DATABASE_URL }}
          PORT=${{ env.PORT }}
          NODE_ENV=${{ env.NODE_ENV }}
          BASE_URL=${{ env.BASE_URL }}
          EOF

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma Migrations
        run: npx prisma migrate deploy

      - name: Build Application
        run: npm run build

      - name: Start Application
        run: |
          npm start > app.log 2>&1 &
          echo $! > app.pid
          sleep 3
          if ! kill -0 $(cat app.pid) 2>/dev/null; then
            echo "App crashed immediately on start:"
            cat app.log
            exit 1
          fi

      - name: Wait for Server
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:4000 > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          echo "--- app.log ---"
          cat app.log || true
          exit 1

      - name: Run Playwright Integration Tests
        id: tests
        continue-on-error: true
        run: npx playwright test

      - name: Show Server Log on Failure
        if: steps.tests.outcome == 'failure'
        run: |
          echo "--- app.log ---"
          cat app.log || true
          echo "--- running node processes ---"
          ps aux | grep node || true

      - name: Zip Playwright Report
        if: always()
        run: |
          if [ -d playwright-report ]; then
            zip -r playwright-report.zip playwright-report/index.html
          fi

      - name: Send Test Report Via Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Integration Test Report - ${{ steps.tests.outcome }} - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: PinMarker Automation Test Bot
          body: |
            Test run finished with status: ${{ steps.tests.outcome }}

            Module: Playwright Integration Test
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            Please see the attached Playwright HTML report.
          attachments: playwright-report.zip

      - name: Show Application Log
        if: always()
        run: |
          cat app.log || true

      - name: Fail Job if Tests Failed
        if: steps.tests.outcome == 'failure'
        run: exit 1